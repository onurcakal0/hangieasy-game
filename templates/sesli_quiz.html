<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ oyun_basligi }} | Sesli Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #0b0c10; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden;}
        
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at center, #1a0b2e 0%, #0b0c10 80%); z-index: -1; }

        .ust-panel { width: 100%; max-width: 800px; padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(20,20,30,0.8); border-bottom: 2px solid #00f2fe; border-radius: 0 0 20px 20px; margin-bottom: 30px;}
        .soru-sayaci { font-size: 20px; font-weight: 800; color: #aaa; }
        .skor-tablosu { font-size: 24px; font-weight: 900; color: #f39c12; }

        .oyun-alani { text-align: center; width: 100%; max-width: 800px; padding: 0 20px; }
        
        /* 🎵 OYNATICI (DÖNEN PLAK VE NEON) */
        .ses-oynatici-kutu {
            width: 200px; height: 200px; margin: 0 auto 30px; border-radius: 50%;
            background: radial-gradient(circle, #222 30%, #000 70%); border: 5px solid #00f2fe;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.4); position: relative; transition: 0.3s;
        }
        .ses-oynatici-kutu:hover { transform: scale(1.05); }
        .oynat-ikon { font-size: 60px; text-shadow: 0 0 20px #00f2fe; }
        
        .oynuyor { animation: spin 4s linear infinite, neonPulse 1s alternate infinite; border-color: #ff0055;}
        .oynuyor .oynat-ikon { content: "🔊"; filter: hue-rotate(90deg);}

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes neonPulse { 0% { box-shadow: 0 0 20px rgba(255, 0, 85, 0.4); } 100% { box-shadow: 0 0 60px rgba(255, 0, 85, 0.8); } }

        /* SEÇENEKLER */
        .secenekler-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;}
        .btn-secenek { 
            background: rgba(25,25,35,0.8); border: 2px solid #333; padding: 20px 10px; 
            color: white; font-size: 16px; font-weight: 800; border-radius: 12px; 
            cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }
        .btn-secenek:hover { background: rgba(0, 242, 254, 0.1); border-color: #00f2fe; transform: translateY(-3px);}
        .dogru { background: #2ecc71 !important; border-color: #2ecc71 !important; color: #000 !important; box-shadow: 0 0 20px rgba(46,204,113,0.5);}
        .yanlis { background: #e74c3c !important; border-color: #e74c3c !important; color: #fff !important; box-shadow: 0 0 20px rgba(231,76,60,0.5);}

        /* FİNAL EKRANI */
        #final-ekrani { display: none; text-align: center; margin-top: 50px; }
        .final-skor { font-size: 80px; font-weight: 900; color: #00f2fe; text-shadow: 0 0 30px rgba(0,242,254,0.5); line-height: 1;}
        
        /* 🪙 HE-COIN BİLDİRİMİ */
        #coin-bildirim {
            position: fixed; top: 20px; right: 20px; 
            background: linear-gradient(45deg, #f1c40f, #f39c12); color: #000; 
            padding: 15px 25px; border-radius: 50px; font-weight: 900; font-size: 18px;
            box-shadow: 0 10px 30px rgba(243, 156, 18, 0.6); z-index: 9999;
            transform: translateX(150%); opacity: 0; transition: all 0.6s;
            display: flex; align-items: center; gap: 10px; border: 2px solid #fff;
        }
        .coin-goster { transform: translateX(0) !important; opacity: 1 !important; }
    </style>
</head>
<body>

    <div id="coin-bildirim">🪙 <span id="coin-yazi"></span></div>

    <div class="ust-panel" id="oyun-paneli">
        <div class="soru-sayaci">Soru: <span id="soru-no" style="color: #fff;">1</span>/<span id="toplam-soru">0</span></div>
        <div class="skor-tablosu">Skor: <span id="skor-deger">0</span></div>
    </div>

    <div class="oyun-alani" id="oyun-kapsayici">
        
        <!-- Gizli Ses Oynatıcı -->
        <audio id="gizli-ses-motoru" src=""></audio>

        <h2 style="color: #00f2fe; margin-bottom: 20px; text-transform: uppercase;">🎧 Sesi Dinle ve Tahmin Et</h2>

        <div class="ses-oynatici-kutu" id="oynat-butonu" onclick="sesiAcKapat()">
            <div class="oynat-ikon" id="ikon">▶️</div>
        </div>

        <p style="color: #aaa; margin-bottom: 30px; font-size: 14px;">(Sesi başlatmak veya durdurmak için ortadaki plağa dokun)</p>

        <div class="secenekler-grid" id="secenekler-alani"></div>
    </div>

    <div id="final-ekrani">
        <h2 style="color:#aaa; font-size:24px; text-transform:uppercase;">Dinleti Sona Erdi</h2>
        <div class="final-skor" id="final-skor-yazi">0</div>
        <p style="color:#f39c12; font-weight:800; font-size:18px; margin-top:10px;">Doğru Tahmin</p>
        
        <!-- 🧠 AI ANALİZ KUTUSU -->
        <div id="ai-analiz-konteynir" style="max-width: 600px; margin: 30px auto; background: rgba(0, 242, 254, 0.05); border: 1px dashed #00f2fe; padding: 25px; border-radius: 20px; display: none;">
            <h3 style="color: #00f2fe; font-size: 20px; margin-bottom: 15px; text-transform: uppercase;">🧠 Yapay Zeka Müzik/Ses Analizin</h3>
            <p id="ai-analiz-metni" style="font-style: italic; color: #fff; font-size: 16px; line-height: 1.6;"></p>
        </div>

        <a href="/" style="display:inline-block; margin-top: 20px; padding: 15px 30px; background: #333; color: #fff; text-decoration: none; font-weight: 800; border-radius: 12px;">🏠 Ana Sayfaya Dön</a>
    </div>

    <script>
        const OYUN_ID = "{{ aktif_oyun }}";
        let SORULAR = [];
        let aktifSoruIndex = 0;
        let toplamSkor = 0;
        let kilitli = false;
        
        let sesMotoru = document.getElementById('gizli-ses-motoru');
        let plakArayuzu = document.getElementById('oynat-butonu');
        let ikon = document.getElementById('ikon');
        let yapayZekaSecimleri = []; 

        window.onload = () => {
            fetch(`/api/sorular/${OYUN_ID}`)
                .then(res => res.json())
                .then(data => {
                    // 🚀 ZIRH 1: Veri yoksa plağı boşuna döndürüp iğneyi bozma!
                    if (!data || data.length === 0) {
                        let secAlan = document.getElementById('secenekler-alani');
                        if(secAlan) secAlan.innerHTML = "<h3 style='color:white; text-align:center; width:100%;'>Teste henüz ses eklenmemiş patron!</h3>";
                        return;
                    }
                    SORULAR = data;
                    let toplamSoru = document.getElementById('toplam-soru');
                    if(toplamSoru) toplamSoru.innerText = SORULAR.length;
                    soruyuHazirla();
                })
                .catch(err => console.error("Veri Çekme Hatası:", err));
        };

        function soruyuHazirla() {
            if(aktifSoruIndex >= SORULAR.length) return oyunuBitir();

            kilitli = false;
            let soru = SORULAR[aktifSoruIndex];
            
            let soruNo = document.getElementById('soru-no');
            if(soruNo) soruNo.innerText = aktifSoruIndex + 1;
            
            // 🚀 KABLO TAMİRİ: Ses dosyasının URL'si resim_url sütununda!
            if(sesMotoru) {
                sesMotoru.src = (soru.resim_url || "").split(',')[0]; 
                sesiDurdur(); // Plağı sessizce başa sar, otomatik başlatıp tarayıcı engeline takılma
            }

            let seceneklerAlani = document.getElementById('secenekler-alani');
            if(seceneklerAlani) seceneklerAlani.innerHTML = '';
            
            // 🚀 KABLO TAMİRİ: Seçenekleri jilet gibi böl ve karıştır
            let secenekDizisi = (soru.secenekler || "").split(',');
            let karisikSecenekler = [...secenekDizisi].sort(() => Math.random() - 0.5);
            
            karisikSecenekler.forEach(secenek => {
                let s = secenek.trim();
                if(s) {
                    let guvenliS = s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    if(seceneklerAlani) {
                        seceneklerAlani.innerHTML += `<button class="btn-secenek" onclick="cevapKontrol(this, '${guvenliS}')">${s}</button>`;
                    }
                }
            });
        }

        function sesiAcKapat() {
            if(!sesMotoru) return;
            if (sesMotoru.paused) {
                // 🚀 ZIRH 2: Play promise'i ile tarayıcı engellerini (autoplay block) yakala
                sesMotoru.play().catch(e => console.log("Tarayıcı otomatik oynatmayı engelledi:", e));
                if(plakArayuzu) plakArayuzu.classList.add('oynuyor');
                if(ikon) ikon.innerText = "🔊";
            } else {
                sesiDurdur();
            }
        }

        function sesiDurdur() {
            if(!sesMotoru) return;
            sesMotoru.pause();
            sesMotoru.currentTime = 0;
            if(plakArayuzu) plakArayuzu.classList.remove('oynuyor');
            if(ikon) ikon.innerText = "▶️";
        }

        // Şarkı bitince plağı durdur
        if(sesMotoru) {
            sesMotoru.onended = function() {
                if(plakArayuzu) plakArayuzu.classList.remove('oynuyor');
                if(ikon) ikon.innerText = "▶️";
            };
        }

        function cevapKontrol(buton, secilenCevap) {
            if(kilitli) return;
            kilitli = true;
            sesiDurdur(); // Cevap verilince müziği anında sustur!

            yapayZekaSecimleri.push(secilenCevap); 
            let dogruCevap = (SORULAR[aktifSoruIndex].dogru_cevap || "").trim();

            if(secilenCevap === dogruCevap) {
                buton.classList.add('dogru');
                toplamSkor += 1;
                let skorDeger = document.getElementById('skor-deger');
                if(skorDeger) skorDeger.innerText = toplamSkor;
            } else {
                buton.classList.add('yanlis');
                let butonlar = document.querySelectorAll('.btn-secenek');
                butonlar.forEach(b => { if(b.innerText === dogruCevap) b.classList.add('dogru'); });
            }

            setTimeout(() => {
                aktifSoruIndex++;
                soruyuHazirla();
            }, 1500);
        }

        function oyunuBitir() {
            let paneli = document.getElementById('oyun-paneli');
            if(paneli) paneli.style.display = 'none';
            let kapsayici = document.getElementById('oyun-kapsayici');
            if(kapsayici) kapsayici.style.display = 'none';
            let finalEkrani = document.getElementById('final-ekrani');
            if(finalEkrani) finalEkrani.style.display = 'block';
            let finalSkorYazi = document.getElementById('final-skor-yazi');
            if(finalSkorYazi) finalSkorYazi.innerText = toplamSkor;

            // 🧠 AI ANALİZİ ÇAĞIR
            fetch('/api/ai_analiz', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ secimler: yapayZekaSecimleri, oyun_basligi: "{{ oyun_basligi }}" })
            })
            .then(res => res.json())
            .then(data => {
                let aiKonteynir = document.getElementById('ai-analiz-konteynir');
                if(aiKonteynir) aiKonteynir.style.display = 'block';
                let aiMetni = document.getElementById('ai-analiz-metni');
                if(aiMetni) aiMetni.innerText = data.analiz;
            }).catch(err => console.log("AI API Hatası:", err));

            // 🪙 HE-COIN KAZANMA TETİKLEYİCİSİ
            fetch('/api/odul_al', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ miktar: 15 }) // Sesli mod zor, 15 coin!
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    let bildirim = document.getElementById('coin-bildirim');
                    if(bildirim) {
                        // Eğer id="coin-yazi" olan bir span/div varsa onu kullan, yoksa span bul
                        let coinYazi = document.getElementById('coin-yazi');
                        if(coinYazi) coinYazi.innerText = `+${data.kazanc} HE-Coin Kazandın!`;
                        else {
                            let span = bildirim.querySelector('span');
                            if(span) span.innerText = `+${data.kazanc} HE-Coin Kazandın!`;
                        }
                        bildirim.classList.add('coin-goster');
                        setTimeout(() => bildirim.classList.remove('coin-goster'), 4000);
                    }
                }
            }).catch(err => console.log("Coin API Hatası:", err));
        }
    </script>
</body>
</html>
