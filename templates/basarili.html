<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İşlem Başarılı | Onur Çakal A.Ş.</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: #0f172a; /* Mağaza ile aynı premium koyu lacivert */
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }
        
        .basari-karti {
            background: #1e293b;
            padding: 50px 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
            max-width: 450px;
            width: 100%;
            animation: yukariCik 0.6s ease-out forwards;
        }

        .ikon-kutusu {
            width: 80px;
            height: 80px;
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            font-size: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px auto;
            border: 2px solid #22c55e;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
            animation: kalpAtisi 2s infinite;
        }

        h1 { font-size: 28px; font-weight: 800; margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 15px; margin-bottom: 30px; line-height: 1.6; }

        .coin-kutusu {
            background: linear-gradient(145deg, #2a1f00, #1a1500);
            border: 1px solid #facc15;
            padding: 20px;
            border-radius: 16px;
            font-size: 32px;
            font-weight: 900;
            color: #facc15;
            margin-bottom: 35px;
            box-shadow: 0 10px 25px rgba(250, 204, 21, 0.15);
            letter-spacing: 1px;
        }

        .btn {
            background: #6366f1;
            color: white;
            text-decoration: none;
            padding: 16px 30px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            display: inline-block;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn:hover {
            background: #4f46e5;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.6);
        }

        /* Havalı Animasyonlar */
        @keyframes yukariCik {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes kalpAtisi {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(34, 197, 94, 0.6); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
        }
    </style>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
</head>
<body>

    <div class="basari-karti">
        <div class="ikon-kutusu">✓</div>
        <h1>Ödeme Onaylandı!</h1>
        <p>İşlem başarıyla gerçekleşti. Satın aldığın bakiye anında cüzdanına tanımlandı patron.</p>
        
        <div class="coin-kutusu">
            +{{ miktar }} 🪙
        </div>

        <a href="/" class="btn">🚀 Ana Sayfaya Dön</a>
    </div>

</body>
</html>
