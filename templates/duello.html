<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Düello | {{ oyun.baslik }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #0b0c10; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at center, #1f0b2e 0%, #0b0c10 80%); z-index: -1; }

        /* LOBİ EKRANI */
        #lobi-ekrani { text-align: center; margin-top: 100px; animation: fadeIn 0.5s; }
        .oda-kodu-kutusu { background: rgba(0,242,254,0.1); border: 2px dashed #00f2fe; padding: 20px; border-radius: 15px; margin: 20px 0; font-size: 30px; font-weight: 900; color: #00f2fe; letter-spacing: 5px; }
        .oyuncu-listesi { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .oyuncu-kart { background: #1a1a24; padding: 15px 30px; border-radius: 10px; font-weight: 800; border: 1px solid #333; }
        .btn-kopyala { background: #f39c12; color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 800; cursor: pointer; }

        /* OYUN EKRANI */
        #oyun-ekrani { display: none; width: 100%; max-width: 900px; padding: 20px; margin-top: 20px; }
        
        /* CANLI SKOR BARLARI (YARIŞ EKRANI) */
        .yaris-alani { background: rgba(25,25,35,0.8); padding: 20px; border-radius: 15px; border: 1px solid #444; margin-bottom: 30px; }
        .yaris-kulvari { margin-bottom: 15px; }
        .oyuncu-isim { font-size: 14px; font-weight: 800; margin-bottom: 5px; color: #aaa; text-transform: uppercase;}
        
        .bar-kapsayici { width: 100%; height: 25px; background: #111; border-radius: 15px; overflow: hidden; position: relative; border: 1px solid #333;}
        .benim-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #00f2fe, #4facfe); transition: width 0.3s ease; }
        .rakip-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #ff0055, #ff4b2b); transition: width 0.3s ease; }

        /* SORU ALANI */
        .soru-alani { text-align: center; }
        .soru-resim { width: 100%; max-width: 400px; border-radius: 15px; border: 3px solid #f39c12; margin-bottom: 20px; box-shadow: 0 0 30px rgba(243,156,18,0.3);}
        .secenekler-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-secenek { background: #222; border: 2px solid #444; color: white; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.2s;}
        .btn-secenek:hover { background: rgba(0,242,254,0.1); border-color: #00f2fe; }

        #sonuc-ekrani { display: none; text-align: center; margin-top: 100px; }
        .kazanan-yazi { font-size: 50px; font-weight: 900; color: #2ecc71; text-transform: uppercase; text-shadow: 0 0 30px rgba(46,204,113,0.5);}

    </style>
</head>
<body>

    <div id="lobi-ekrani">
        <h1 style="color: #fff;">⚔️ DÜELLO LOBİSİ</h1>
        <p style="color: #aaa;">Arkadaşının kodu girip odaya katılmasını bekle...</p>
        
        <div class="oda-kodu-kutusu" id="kodu-goster">{{ oda_kodu }}</div>
        
        <button class="btn-kopyala" onclick="linkiKopyala()">🔗 Davet Linkini Kopyala</button>

        <div class="oyuncu-listesi" id="bekleyen-oyuncular">
            </div>
    </div>

    <div id="oyun-ekrani">
        <div class="yaris-alani">
            <div class="yaris-kulvari">
                <div class="oyuncu-isim">Sen (<span id="benim-puan">0</span>)</div>
                <div class="bar-kapsayici"><div class="benim-bar" id="benim-cubuk"></div></div>
            </div>
            <div class="yaris-kulvari">
                <div class="oyuncu-isim">Rakip (<span id="rakip-puan">0</span>)</div>
                <div class="bar-kapsayici"><div class="rakip-bar" id="rakip-cubuk"></div></div>
            </div>
        </div>

        <div class="soru-alani">
            <img src="" id="soru-resmi" class="soru-resim">
            <div class="secenekler-grid" id="secenekler-alani"></div>
        </div>
    </div>

    <div id="sonuc-ekrani">
        <div class="kazanan-yazi" id="mac-sonucu"></div>
        <p style="margin-top:20px; font-size: 20px; color: #f39c12;" id="he-coin-mesaj"></p>
        <a href="/" style="display:inline-block; margin-top: 30px; padding:15px 30px; background:#333; color:#fff; text-decoration:none; font-weight:800; border-radius:12px;">Ana Sayfaya Dön</a>
    </div>

    <script>
        const socket = io();
        const ODA_KODU = "{{ oda_kodu }}";
        const OYUN_ID = "{{ oyun.id }}";
        const BEN = "{{ session.kullanici_adi }}";
        
        let SORULAR = [];
        let aktifSoruIndex = 0;
        let benimSkorum = 0;
        let soruKilitli = false;

        // Odaya Katılma Sinyali Gönder
        socket.on('connect', () => {
            socket.emit('odaya_katil', { oda: ODA_KODU });
        });

        // Lobi Güncellemesi (Biri gelince)
        socket.on('lobi_guncelle', (data) => {
            let liste = document.getElementById('bekleyen-oyuncular');
            if(liste) {
                liste.innerHTML = '';
                data.oyuncular.forEach(oyuncu => {
                    let renk = oyuncu === BEN ? '#00f2fe' : '#ff0055';
                    liste.innerHTML += `<div class="oyuncu-kart" style="border-color:${renk};">${oyuncu}</div>`;
                });
            }
        });

        // 2 Kişi Gelince Maç Başlar!
        socket.on('maci_baslat', () => {
            document.getElementById('lobi-ekrani').style.display = 'none';
            document.getElementById('oyun-ekrani').style.display = 'block';
            
            // Soruları çek ve ilk soruyu çiz
            fetch(`/api/sorular/${OYUN_ID}`)
                .then(res => res.json())
                .then(data => {
                    // 🚀 ZIRH 1: Veri boşsa sistemi kilitle
                    if(!data || data.length === 0) {
                        document.getElementById('secenekler-alani').innerHTML = "<h3 style='color:#fff;'>Teste soru eklenmemiş!</h3>";
                        return;
                    }
                    SORULAR = data;
                    soruyuCiz();
                })
                .catch(err => console.error("Veri Çekme Hatası:", err));
        });

        // 📡 SKORLAR GÜNCELLENDİĞİNDE
        socket.on('skor_guncelle', (skorlar) => {
            for (let oyuncu in skorlar) {
                let puan = skorlar[oyuncu];
                let yuzde = (puan / SORULAR.length) * 100;

                if(oyuncu === BEN) {
                    let benPuan = document.getElementById('benim-puan');
                    let benCubuk = document.getElementById('benim-cubuk');
                    if(benPuan) benPuan.innerText = puan;
                    if(benCubuk) benCubuk.style.width = yuzde + '%';
                } else {
                    let rakipPuan = document.getElementById('rakip-puan');
                    let rakipCubuk = document.getElementById('rakip-cubuk');
                    if(rakipPuan) rakipPuan.innerText = puan;
                    if(rakipCubuk) rakipCubuk.style.width = yuzde + '%';
                }
            }

            // Rakip %100 yaptıysa oyunu bitir!
            let rakiplerinPuanlari = Object.values(skorlar);
            if(Math.max(...rakiplerinPuanlari) >= SORULAR.length) {
                maciBitir(skorlar);
            }
        });

        function soruyuCiz() {
            // Sorular bittiyse rakibi bekleme ekranı
            if(aktifSoruIndex >= SORULAR.length) {
                document.getElementById('secenekler-alani').innerHTML = "<h3 style='color:#00f2fe; text-align:center;'>Rakibin bitirmesi bekleniyor... ⏳</h3>";
                return; 
            }
            
            soruKilitli = false;
            let soru = SORULAR[aktifSoruIndex];
            
            // 🚀 ZIRH 2: Resim URL'sini güvene al ve kırık resim koruması ekle
            let resimElem = document.getElementById('soru-resmi');
            if(resimElem) {
                let gelenResim = (soru.resim_url || "").split(',')[0]; // İlk resmi al
                resimElem.src = gelenResim;
                resimElem.onerror = function() { this.src='https://via.placeholder.com/400x400/151520/FFFFFF?text=Resim+Yok'; };
            }
            
            let secAlan = document.getElementById('secenekler-alani');
            secAlan.innerHTML = '';
            
            // 🚀 ZIRH 3: Seçenekleri doğru parçala ve karıştır
            let seceneklerDizisi = (soru.secenekler || "").split(',');
            let karisik = [...seceneklerDizisi].sort(() => Math.random() - 0.5);
            
            karisik.forEach(sec => {
                let s = sec.trim();
                if(s) {
                    // Tırnak işaretlerini sabote edilmemesi için temizle
                    let guvenliS = s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    secAlan.innerHTML += `<button class="btn-secenek" onclick="cevapVer(this, '${guvenliS}')">${s}</button>`;
                }
            });
        }

        function cevapVer(buton, secim) {
            if(soruKilitli) return;
            soruKilitli = true;

            // 🚀 ZIRH 4: Doğru cevap boş gelirse patlama koruması
            let dogruCevap = (SORULAR[aktifSoruIndex].dogru_cevap || "").trim();
            
            if(secim === dogruCevap || dogruCevap === "Farketmez" || dogruCevap === "") {
                buton.style.background = "#2ecc71";
                buton.style.boxShadow = "0 0 15px rgba(46, 204, 113, 0.6)";
                benimSkorum += 1;
                
                // SUNUCUYA HABER VER: Puan kazandım!
                socket.emit('cevap_yolla', { oda: ODA_KODU, puan: benimSkorum });
            } else {
                buton.style.background = "#e74c3c";
                buton.style.boxShadow = "0 0 15px rgba(231, 76, 60, 0.6)";
            }

            setTimeout(() => {
                aktifSoruIndex++;
                soruyuCiz();
            }, 1000);
        }

        function maciBitir(finalSkorlar) {
            document.getElementById('oyun-ekrani').style.display = 'none';
            document.getElementById('sonuc-ekrani').style.display = 'block';

            let rakipPuan = 0;
            for (let o in finalSkorlar) { if(o !== BEN) rakipPuan = finalSkorlar[o]; }

            let mesaj = document.getElementById('mac-sonucu');
            let coinMesaj = document.getElementById('he-coin-mesaj');

            if(benimSkorum > rakipPuan) {
                mesaj.innerText = "🏆 KAZANDIN!";
                mesaj.style.color = "#2ecc71";
                mesaj.style.textShadow = "0 0 20px rgba(46, 204, 113, 0.5)";
                
                // Kazanan parayı alır!
                fetch('/api/odul_al', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({miktar: 50}) })
                .then(res => res.json())
                .then(data => {
                    if(data.status === 'success' && coinMesaj) {
                        coinMesaj.innerText = `💰 ${data.kazanc} HE-Coin Kazandın! Patron çıldırdı!`;
                        coinMesaj.style.color = "#facc15";
                    }
                });
            } else if (benimSkorum < rakipPuan) {
                mesaj.innerText = "💀 KAYBETTİN!";
                mesaj.style.color = "#ff0055";
                mesaj.style.textShadow = "0 0 20px rgba(255, 0, 85, 0.5)";
                if(coinMesaj) coinMesaj.innerText = "Bir dahaki sefere daha hızlı ol!";
            } else {
                mesaj.innerText = "🤝 BERABERE!";
                mesaj.style.color = "#f39c12";
                if(coinMesaj) coinMesaj.innerText = "İki büyük vizyoner yenişemedi!";
            }
        }

        function linkiKopyala() {
            let link = window.location.origin + "/duello/" + ODA_KODU;
            navigator.clipboard.writeText(link);
            alert("Link Kopyalandı! Arkadaşına gönder, arenaya gelsin.");
        }
    </script>
</body>
</html>
