<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yarışma Ekranı | Hangieasy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #0b0c10; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-x: hidden; padding: 20px;}
        
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at center, #1f0b2e 0%, #0b0c10 80%); z-index: -1; }

        /* DURUM EKRANLARI (BEKLEME / BİTİŞ) */
        .durum-ekrani { text-align: center; animation: pulse 2s infinite; }
        .durum-ikon { font-size: 60px; margin-bottom: 20px; text-shadow: 0 0 20px #00f2fe; }
        .durum-metin { font-size: 24px; font-weight: 800; color: #00f2fe; text-transform: uppercase; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8;} 50% { transform: scale(1.05); opacity: 1;} 100% { transform: scale(1); opacity: 0.8;} }

        /* OYUN EKRANI */
        #oyun-ekrani { display: none; width: 100%; max-width: 600px; text-align: center; }
        .puan-tabelasi { background: rgba(0, 242, 254, 0.1); border: 1px solid #00f2fe; color: #00f2fe; padding: 10px 20px; border-radius: 20px; font-weight: 900; font-size: 18px; margin-bottom: 20px; display: inline-block;}
        
        .soru-resim { width: 100%; max-height: 300px; object-fit: cover; border-radius: 15px; border: 3px solid #f39c12; margin-bottom: 20px; box-shadow: 0 0 30px rgba(243,156,18,0.3); display: none; /* Başlangıçta gizli tutuyoruz */}
        
        .secenekler-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-secenek { background: #222; border: 2px solid #444; color: white; padding: 20px 10px; border-radius: 12px; font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase;}
        
        /* Buton Tıklanma Efektleri */
        .btn-secenek:active { transform: scale(0.95); }
        .btn-secenek.secildi { border-color: #f39c12; background: rgba(243, 156, 18, 0.2); }
        .btn-secenek.dogru { background: #2ecc71 !important; border-color: #2ecc71 !important; color: #000; }
        .btn-secenek.yanlis { background: #e74c3c !important; border-color: #e74c3c !important; color: #fff; }
        
        /* Kumanda Bekleniyor Kilidi */
        .kilitli { pointer-events: none; opacity: 0.6; }
    </style>
</head>
<body>

    <!-- BEKLEME EKRANI -->
    <div id="bekleme-ekrani" class="durum-ekrani">
        <div class="durum-ikon">⏳</div>
        <div class="durum-metin">Yayıncının Başlatması Bekleniyor...</div>
        <p style="color: #aaa; margin-top: 10px; font-size: 14px;">Telefonu elinden bırakma, şov birazdan başlıyor!</p>
    </div>

    <!-- OYUN ALANI -->
    <div id="oyun-ekrani">
        <div class="puan-tabelasi">Skorun: <span id="benim-puanim">0</span></div>
        <img src="" id="soru-resmi" class="soru-resim">
        <div class="secenekler-grid" id="secenekler-alani"></div>
        <div id="kilit-uyarisi" style="display: none; color: #f39c12; margin-top: 20px; font-weight: 800; animation: pulse 1s infinite;">Yayıncının Sıradaki Soruya Geçmesi Bekleniyor...</div>
    </div>

    <!-- BİTİŞ EKRANI -->
    <div id="bitis-ekrani" class="durum-ekrani" style="display: none;">
        <div class="durum-ikon" style="color: #2ecc71;">🏁</div>
        <div class="durum-metin" style="color: #2ecc71;">Yayın Sona Erdi!</div>
        <div style="font-size: 40px; font-weight: 900; margin-top: 20px;" id="final-skor">0 Puan</div>
        <p style="color: #aaa; margin-top: 10px;">Liderlik tablosu için yayıncının ekranına bak!</p>
        <a href="/" style="display:inline-block; margin-top: 30px; padding:15px 30px; background:#333; color:#fff; text-decoration:none; font-weight:800; border-radius:12px;">Ana Sayfaya Dön</a>
    </div>

    <script>
        const socket = io();
        const YAYIN_KODU = "{{ yayin_kodu }}";
        const OYUN_ID = "{{ oyun.id }}";
        
        let SORULAR = [];
        let benimSkorum = 0;
        let soruCevaplandi = false;

        // 1. Odaya Bağlan
        socket.on('connect', () => {
            socket.emit('yayina_katil', { yayin_kodu: YAYIN_KODU });
        });

        // 2. Arka Planda Soruları İndir (Hazırda Beklesin)
        fetch(`/api/sorular/${OYUN_ID}`)
            .then(res => res.json())
            .then(data => { SORULAR = data; });

        // 3. YAYINCIDAN GELEN EMRİ DİNLE! (Burası işin kalbi)
        socket.on('yayinci_emri', (data) => {
            let aksiyon = data.aksiyon;
            let index = data.index;

            if (aksiyon === 'baslat') {
                document.getElementById('bekleme-ekrani').style.display = 'none';
                document.getElementById('oyun-ekrani').style.display = 'block';
                soruyuCiz(0); // İlk soruyu çiz
            } 
            else if (aksiyon === 'siradaki_soru') {
                if (index < SORULAR.length) {
                    soruyuCiz(index);
                } else {
                    yayiniKapat(); 
                }
            }
            else if (aksiyon === 'bitir') {
                yayiniKapat();
            }
        });

        // 🚀 KABLO TAMİRİ: Ekrana Soruyu Basan Motor
        function soruyuCiz(index) {
            soruCevaplandi = false;
            document.getElementById('secenekler-alani').classList.remove('kilitli');
            document.getElementById('kilit-uyarisi').style.display = 'none';
            
            let soru = SORULAR[index];
            
            // 🚀 ZIRH: Kırık Resim Koruması
            let resimUrl = (soru.resim_url || soru.resim || "").split(',')[0]; 
            let resimElem = document.getElementById('soru-resmi');
            
            if(resimUrl && resimUrl.trim() !== "") {
                resimElem.src = resimUrl.trim();
                resimElem.style.display = 'block';
                resimElem.onerror = function() { this.style.display = 'none'; }; // Yüklenemezse gizle
            } else {
                resimElem.style.display = 'none'; 
            }
            
            let secAlan = document.getElementById('secenekler-alani');
            secAlan.innerHTML = '';
            
            // 🚀 MOTOR: Harf harf bölmeyi engelle, virgülden parçala!
            let hamSecenekler = soru.secenekler || "";
            let seceneklerDizisi = (typeof hamSecenekler === 'string') ? hamSecenekler.split(',') : hamSecenekler;
            
            // Şıkları Karıştır
            let karisik = [...seceneklerDizisi].sort(() => Math.random() - 0.5);
            karisik.forEach(sec => {
                let s = sec.trim();
                if(s !== "") {
                    // Güvenlik için tırnakları escape ediyoruz
                    let guvenliS = s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    let dogruCevap = (soru.dogru_cevap || "").trim().replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    
                    secAlan.innerHTML += `<button class="btn-secenek" onclick="cevapVer(this, '${guvenliS}', '${dogruCevap}')">${s}</button>`;
                }
            });
        }

        // Tıklama Motoru
        function cevapVer(buton, secim, dogruCevap) {
            if (soruCevaplandi) return;
            soruCevaplandi = true;

            // Ekranı kilitle ki bir daha basamasın
            document.getElementById('secenekler-alani').classList.add('kilitli');
            document.getElementById('kilit-uyarisi').style.display = 'block';

            if (secim === dogruCevap || dogruCevap === "Farketmez") {
                buton.classList.add('dogru');
                benimSkorum += 10; // Doğru cevaba 10 puan!
                document.getElementById('benim-puanim').innerText = benimSkorum;
                
                // SUNUCUYA HABER VER: Puan kazandım, liderlik tablomu güncelle!
                socket.emit('izleyici_cevap_gonder', { yayin_kodu: YAYIN_KODU, puan: benimSkorum });
            } else {
                buton.classList.add('yanlis');
                // Doğru olanı yeşil yak
                let butonlar = document.querySelectorAll('.btn-secenek');
                butonlar.forEach(b => { if(b.innerText === dogruCevap) b.classList.add('dogru'); });
            }
        }

        function yayiniKapat() {
            document.getElementById('oyun-ekrani').style.display = 'none';
            document.getElementById('bekleme-ekrani').style.display = 'none';
            document.getElementById('bitis-ekrani').style.display = 'block';
            document.getElementById('final-skor').innerText = benimSkorum + " Puan";
        }
    </script>
</body>
</html>
