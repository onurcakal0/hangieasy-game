<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ oyun_basligi }} | Turnuva Ağacı</title>
    
    <meta property="og:title" content="{{ oyun.baslik }} | Hangieasy Turnuva">
    <meta property="og:description" content="{{ oyun.aciklama }}">
    <meta property="og:image" content="{{ request.url_root }}{{ oyun.resim_url }}">
    <meta property="og:url" content="{{ request.url }}">
    <meta name="twitter:card" content="summary_large_image">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background-color: #0b0c10; color: #ffffff; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; padding: 50px 5%; overflow-x: hidden; position: relative;
        }
        
        /* 🌌 IŞILTILI RGB ARKAPLAN (Şampiyonluk Altını ve Arena Mavisi) */
        body::before, body::after {
            content: ''; position: fixed; width: 50vw; height: 50vw;
            border-radius: 50%; filter: blur(120px); z-index: -1;
            animation: orbFloat 12s infinite alternate ease-in-out;
        }
        body::before { background: rgba(243, 156, 18, 0.15); top: -10%; left: -10%; } /* Altın */
        body::after { background: rgba(0, 242, 254, 0.12); bottom: -10%; right: -10%; animation-delay: -4s; } /* Mavi */
        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }
        
        .oyun-alani { width: 100%; max-width: 1000px; text-align: center; z-index: 2; position: relative;}
        
        /* 🧊 CAM EFEKTLİ BAŞLIK */
        .baslik-cam { 
            text-align: center; margin-bottom: 40px; 
            background: rgba(20, 20, 30, 0.6); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05); padding: 25px 40px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%; max-width: 900px; margin-left: auto; margin-right: auto;
        }
        .baslik-cam h2 { 
            font-size: 24px; font-weight: 800; color: #aaa; 
            margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;
        }
        
        /* ŞAMPİYONLAR LİGİ ETKİSİ (Dinamik Tur Başlığı) */
        #tur-basligi { 
            font-size: 42px; font-weight: 900; 
            background: linear-gradient(90deg, #f39c12, #ff0055); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            margin-bottom: 5px; letter-spacing: 2px; 
            text-shadow: 0 0 20px rgba(243, 156, 18, 0.3);
            text-transform: uppercase;
        }
        #mac-sayaci { color: #00f2fe; font-size: 18px; font-weight: 800; letter-spacing: 1px;}
        
        .kapisma-alani { display: flex; justify-content: center; align-items: stretch; gap: 40px; position: relative;}
        
        /* 🎮 KAPIŞMA KARTLARI (Glassmorphism) */
        .kart { 
            flex: 1; background: rgba(25, 25, 35, 0.6); backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.05); border-radius: 20px; 
            overflow: hidden; cursor: pointer; padding-bottom: 25px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .kart:hover { 
            transform: translateY(-15px) scale(1.02); 
            box-shadow: 0 20px 50px rgba(243, 156, 18, 0.3); 
            border-color: #f39c12;
        }
        .kart img { 
            width: 100%; height: 350px; object-fit: cover; 
            border-bottom: 2px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.5s ease;
        }
        .kart:hover img { transform: scale(1.05); }
        .kart h3 { margin-top: 25px; font-size: 26px; font-weight: 800; color: #fff;}

        /* ⚔️ NEON VS ROZETİ */
        .vs-rozet { 
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); 
            background: linear-gradient(135deg, #f39c12, #e67e22); color: #000; 
            width: 80px; height: 80px; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 32px; font-weight: 900; z-index: 10;
            box-shadow: 0 0 30px rgba(243, 156, 18, 0.6);
            border: 4px solid #0b0c10;
            animation: pulseVS 2s infinite;
        }
        @keyframes pulseVS {
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 30px rgba(243, 156, 18, 0.6); }
            50% { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 50px rgba(243, 156, 18, 0.8); }
            100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 30px rgba(243, 156, 18, 0.6); }
        }
        
        /* 🟢 SEÇİLEN KART EFEKTİ (Zafer Yeşili) */
        .secildi { 
            border-color: #00b09b !important; 
            background: rgba(0, 176, 155, 0.15) !important;
            box-shadow: 0 0 40px rgba(0, 176, 155, 0.4) !important;
            transform: scale(1.05) !important;
        }

        /* Reklam Alanı */
        .reklam-alani {
            background: rgba(20, 20, 30, 0.5); backdrop-filter: blur(5px);
            border: 1px dashed rgba(255, 255, 255, 0.2); color: #555;
            text-align: center; display: flex; align-items: center; justify-content: center;
            margin: 40px auto 0; border-radius: 12px; font-size: 12px; text-transform: uppercase; letter-spacing: 2px;
        }
        .reklam-kare { width: 100%; max-width: 300px; height: 250px; }
        
        /* Şampiyonluk Ekranı Butonları */
        .btn-aksiyon {
            padding: 15px 30px; border-radius: 12px; font-weight: 800; 
            font-size: 16px; cursor: pointer; transition: 0.3s; 
            text-transform: uppercase; letter-spacing: 1px; border: none; text-decoration: none;
        }
        .btn-anasayfa { background: linear-gradient(45deg, #0f0f13, #1a1a24); color: white; border: 1px solid #333;}
        .btn-anasayfa:hover { border-color: #00f2fe; box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); transform: translateY(-3px);}
        
        .btn-global { background: linear-gradient(45deg, #f39c12, #e67e22); color: #000; }
        .btn-global:hover { box-shadow: 0 10px 25px rgba(243, 156, 18, 0.4); transform: translateY(-3px);}
/* 🪙 HE-COIN KAZANMA ANİMASYONU */
        #coin-bildirim {
            position: fixed; top: 20px; right: 20px; 
            background: linear-gradient(45deg, #f1c40f, #f39c12); color: #000; 
            padding: 15px 25px; border-radius: 50px; font-weight: 900; font-size: 18px;
            box-shadow: 0 10px 30px rgba(243, 156, 18, 0.6); z-index: 9999;
            transform: translateX(150%); opacity: 0; 
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            display: flex; align-items: center; gap: 10px; border: 2px solid #fff;
        }
        .coin-goster { transform: translateX(0) !important; opacity: 1 !important; }
    </style>
</head>
<body>
    <div id="coin-bildirim">🪙 <span>+10 HE-Coin Kazandın!</span></div>

    <div class="oyun-alani" id="oyun-kutusu">
        <div class="baslik-cam">
            <h2>{{ oyun_basligi }}</h2>
            <div id="tur-basligi">Ağaç Kuruluyor...</div>
            <div id="mac-sayaci">Sistem Hazırlanıyor</div>
        </div>

        <div class="kapisma-alani" id="kapisma-kutusu"></div>
        
        <div class="reklam-alani reklam-kare">
            Google AdSense<br>Kare Reklam (300x250)
        </div>
    </div>

    <script>
        const OYUN_ID = "{{ aktif_oyun }}";
        const AKTIF_DIL = "{{ aktif_dil }}"; 

        const SOZLUK = {
            'tr': {
                'final': '🏆 BÜYÜK FİNAL 🏆',
                'yari_final': '🔥 YARI FİNAL 🔥',
                'ceyrek_final': '⚔️ ÇEYREK FİNAL ⚔️',
                'son16': '🎯 SON 16 🎯',
                'tur': 'TUR',
                'kisi': 'Kişi',
                'sampiyon': 'ŞAMPİYON',
                'mac': 'Maç',
                'toplam_mac': 'Toplam',
                'hata_limit': 'Turnuva için en az 2 öğe eklemelisin patron!',
                'paylas_metin': 'Benim favorim {isim}! 🏆 Sen kimi seçeceksin? Hemen oyna: {link}',
                'wp_btn': '💬 WhatsApp\'ta Meydan Oku',
                'x_btn': '𝕏 X\'te Paylaş',
                'anasayfa_btn': '🏠 Ana Sayfaya Dön',
                'global_btn': '📊 Global Sonuçları Gör'
            },
            'en': {
                'final': '🏆 GRAND FINAL 🏆',
                'yari_final': '🔥 SEMI FINAL 🔥',
                'ceyrek_final': '⚔️ QUARTER FINAL ⚔️',
                'son16': '🎯 ROUND OF 16 🎯',
                'tur': 'ROUND',
                'kisi': 'Players',
                'sampiyon': 'CHAMPION',
                'mac': 'Match',
                'toplam_mac': 'Total',
                'hata_limit': 'You need at least 2 items for a tournament boss!',
                'paylas_metin': 'My ultimate favorite is {isim}! 🏆 Who will you choose? Play now: {link}',
                'wp_btn': '💬 Challenge on WhatsApp',
                'x_btn': '𝕏 Share on X',
                'anasayfa_btn': '🏠 Back to Home',
                'global_btn': '📊 See Global Results'
            }
        };

        const T = SOZLUK[AKTIF_DIL] || SOZLUK['tr'];

        let adaylar = [];
        let sonrakiTur = [];
        let toplamMac = 0;
        let macSayisi = 0;
        let yapayZekaSecimleri = []; // 🧠 AI Analizi için oyuncunun sevdiği her şey burada toplanacak

        window.onload = () => {
            fetch(`/api/sorular/${OYUN_ID}`)
                .then(res => res.json())
                .then(data => {
                    // 🚀 ZIRH 1: Veri gelmezse sistemi çökertme
                    if (!data || data.length === 0) {
                        let kutu = document.getElementById('oyun-kutusu');
                        if(kutu) kutu.innerHTML = `<h2 style='color:red;'>${T.hata_limit}</h2>`;
                        return;
                    }

                    // 🚀 KABLO TAMİRİ: Her satır tek bir seçenektir, string'in harfini değil kendisini al!
                    adaylar = data.map(d => ({ 
                        isim: d.secenekler ? d.secenekler.trim() : "İsimsiz Seçenek", 
                        resim: (d.resim_url || "").split(',')[0] // URL'nin ilkini garantiye al
                    })).sort(() => Math.random() - 0.5);

                    // Efsane 2'nin Kuvvetleri Algoritması (2, 4, 8, 16...)
                    let limit = 2;
                    while (limit * 2 <= adaylar.length) limit *= 2;
                    adaylar = adaylar.slice(0, limit); 

                    if(adaylar.length < 2) {
                        let kutu = document.getElementById('oyun-kutusu');
                        if(kutu) kutu.innerHTML = `<h2 style='color:red;'>${T.hata_limit}</h2>`;
                        return;
                    }
                    
                    turBaslat();
                })
                .catch(err => console.error("Veri Çekme Hatası:", err));
        };

        function turIsmiBul(kisiSayisi) {
            if(kisiSayisi === 2) return T.final;
            if(kisiSayisi === 4) return T.yari_final;
            if(kisiSayisi === 8) return T.ceyrek_final;
            if(kisiSayisi === 16) return T.son16;
            return `${T.tur} (${kisiSayisi} ${T.kisi})`;
        }

        function turBaslat() {
            if(adaylar.length === 1) {
                sampiyonuGoster(adaylar[0]);
                return;
            }
            
            sonrakiTur = [];
            toplamMac = adaylar.length / 2;
            macSayisi = 1;
            
            let turBasligi = document.getElementById('tur-basligi');
            if(turBasligi) turBasligi.innerText = turIsmiBul(adaylar.length);
            
            macaCik();
        }

        function macaCik() {
            if(adaylar.length === 0) {
                adaylar = sonrakiTur;
                turBaslat();
                return;
            }

            let sol = adaylar.pop();
            let sag = adaylar.pop();

            let macSayaci = document.getElementById('mac-sayaci');
            if(macSayaci) macSayaci.innerText = `${macSayisi}. ${T.mac} / ${T.toplam_mac} ${toplamMac}`;

            let kapismaKutusu = document.getElementById('kapisma-kutusu');
            if(kapismaKutusu) {
                // 🚀 ZIRH 2: Resim yüklenmezse diye onerror koruması
                kapismaKutusu.innerHTML = `
                    <div class="kart secenek-kart" onclick="secimYap('${sol.isim.replace(/'/g, "\\'")}', '${sol.resim}', this)">
                        <img src="${sol.resim}" onerror="this.src='https://via.placeholder.com/400x400/151520/FFFFFF?text=Resim+Yok'">
                        <h3>${sol.isim}</h3>
                    </div>

                    <div class="vs-rozet">VS</div>

                    <div class="kart secenek-kart" onclick="secimYap('${sag.isim.replace(/'/g, "\\'")}', '${sag.resim}', this)">
                        <img src="${sag.resim}" onerror="this.src='https://via.placeholder.com/400x400/151520/FFFFFF?text=Resim+Yok'">
                        <h3>${sag.isim}</h3>
                    </div>
                `;
            }
            
            // ⚡ YÜKSEK PERFORMANS: Bir sonraki turun resimlerini arka planda indir
            if (adaylar.length >= 2) {
                let siradakiSol = adaylar[adaylar.length - 1];
                let siradakiSag = adaylar[adaylar.length - 2];
                let img1 = new Image(); img1.src = siradakiSol.resim;
                let img2 = new Image(); img2.src = siradakiSag.resim;
            }
        }

        function secimYap(secilenIsim, secilenResim, secilenKart) {
            let tumKartlar = document.querySelectorAll('.secenek-kart');
            tumKartlar.forEach(kart => kart.onclick = null);

            secilenKart.classList.add('secildi');
            sonrakiTur.push({ isim: secilenIsim, resim: secilenResim });
            yapayZekaSecimleri.push(secilenIsim); // 🧠 AI Analizi için seçimleri kaydet!

            macSayisi++;
            setTimeout(() => { macaCik(); }, 600);
        }

        function sampiyonuGoster(sampiyon) {
            let macSayaci = document.getElementById('mac-sayaci');
            if(macSayaci) macSayaci.style.display = 'none';
            
            let turBasligi = document.getElementById('tur-basligi');
            if(turBasligi) {
                turBasligi.innerHTML = `👑 ${T.sampiyon} 👑`;
                turBasligi.style.background = "linear-gradient(90deg, #f1c40f, #f39c12)";
                turBasligi.style.webkitBackgroundClip = "text";
            }

            // Arka planda şampiyonu veritabanına yaz
            fetch('/api/kazandi', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ oyun_id: OYUN_ID, kazanan: sampiyon.isim })
            });

            // VİRAL BÜYÜME MOTORU
            let oyunLink = window.location.href;
            let paylasimMetni = T.paylas_metin.replace('{isim}', sampiyon.isim).replace('{link}', oyunLink);
            
            let wpLink = `https://api.whatsapp.com/send?text=${encodeURIComponent(paylasimMetni)}`;
            let xLink = `https://twitter.com/intent/tweet?text=${encodeURIComponent(paylasimMetni)}`;

            let kapismaKutusu = document.getElementById('kapisma-kutusu');
            if(kapismaKutusu) {
                kapismaKutusu.innerHTML = `
                    <div style="width: 100%; text-align: center; animation: 1s ease-out 0s 1 fadeIn;">
                        <div class="kart" style="max-width: 480px; margin: 0 auto; border-color: #f39c12; box-shadow: 0 25px 60px rgba(243, 156, 18, 0.5); cursor: default; transform: scale(1.05);">
                            <img src="${sampiyon.resim}" onerror="this.src='https://via.placeholder.com/400x400/151520/FFFFFF?text=Resim+Yok'" style="height: 420px; border-bottom: 3px solid #f39c12;">
                            <h3 style="font-size: 36px; color: #f39c12; padding: 25px 0;">${sampiyon.isim}</h3>
                        </div>
                        
                        <div style="margin-top: 40px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                            <a href="${wpLink}" target="_blank" style="background: linear-gradient(45deg, #25D366, #128C7E); color: white; padding: 15px 25px; text-decoration: none; border-radius: 12px; font-weight: 800; display: flex; align-items: center; transition: 0.3s; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.4);">
                                ${T.wp_btn}
                            </a>
                            <a href="${xLink}" target="_blank" style="background: linear-gradient(45deg, #0f0f13, #1a1a24); border: 1px solid #333; color: white; padding: 15px 25px; text-decoration: none; border-radius: 12px; font-weight: 800; display: flex; align-items: center; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.5);">
                                ${T.x_btn}
                            </a>
                        </div>

                        <div style="margin-top: 30px; display:flex; gap:15px; justify-content:center;">
                            <button class="btn-aksiyon btn-anasayfa" onclick="location.href='/'">${T.anasayfa_btn}</button>
                            <button class="btn-aksiyon btn-global" onclick="location.href='/istatistikler/' + OYUN_ID">${T.global_btn}</button>
                        </div>
                    </div>
                `;
            }

            // 🧠 ZIRH 3: AI ANALİZİ ÇAĞIR
            fetch('/api/ai_analiz', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ secimler: yapayZekaSecimleri, oyun_basligi: "{{ oyun_basligi }}" })
            })
            .then(res => res.json())
            .then(data => {
                let aiKonteynir = document.getElementById('ai-analiz-konteynir');
                if(aiKonteynir) aiKonteynir.style.display = 'block';
                let aiMetni = document.getElementById('ai-analiz-metni');
                if(aiMetni) aiMetni.innerText = data.analiz;
            }).catch(err => console.log("AI API Hatası:", err));

            // 🪙 KURŞUN GEÇİRMEZ COİN ALICI
            fetch('/api/odul_al', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ miktar: 15 }) // Turnuva uzun sürer, 15 coin!
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    let bildirim = document.getElementById('coin-bildirim');
                    if(bildirim) {
                        let kazanilan = data.kazanc || data.miktar || data.odul || 15;
                        let span = bildirim.querySelector('span');
                        if(span) span.innerText = `+${kazanilan} HE-Coin Kazandın!`;
                        bildirim.classList.add('coin-goster');
                        setTimeout(() => bildirim.classList.remove('coin-goster'), 4000);
                    }
                }
            }).catch(err => console.log("Coin API Hatası:", err));
        }
    </script>
</body>
</html>
