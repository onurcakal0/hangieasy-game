<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HangiEasy Stüdyo | Yeni Test Üret</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background-color: #0b0c10; color: #ffffff; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 40px 20px; position: relative; overflow-x: hidden;
        }
        
        /* 🌌 IŞILTILI RGB ARKAPLAN (Yaratıcılık Moru ve Enerji Sarısı) */
        body::before, body::after {
            content: ''; position: fixed; width: 50vw; height: 50vw;
            border-radius: 50%; filter: blur(120px); z-index: -1;
            animation: orbFloat 15s infinite alternate ease-in-out;
        }
        body::before { background: rgba(138, 35, 135, 0.15); top: -10%; left: -10%; } /* Mor */
        body::after { background: rgba(243, 156, 18, 0.12); bottom: -10%; right: -10%; animation-delay: -5s; } /* Sarı */
        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 60px) scale(1.15); }
        }

        /* 🧊 CAM EFEKTLİ (GLASSMORPHISM) FORM KUTUSU */
        .form-kutusu { 
            background: rgba(20, 20, 30, 0.6); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05); padding: 50px 40px; 
            border-radius: 20px; width: 100%; max-width: 650px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.6), 0 0 20px rgba(243, 156, 18, 0.1); 
            position: relative; z-index: 1;
        }
        
        /* BAŞLIK */
        .form-kutusu h2 { 
            font-size: 32px; font-weight: 900; text-align: center;
            background: linear-gradient(90deg, #f39c12, #ff007a); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px;
        }

        /* FORM GRUPLARI VE INPUTLAR */
        .grup { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; color: #ddd; font-weight: 600; font-size: 14px; letter-spacing: 0.5px;}
        
        input[type="text"], select { 
            width: 100%; padding: 16px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); background: rgba(0, 0, 0, 0.4); 
            color: white; outline: none; transition: all 0.3s ease; font-size: 15px;
            appearance: none; /* Select okunu temizlemek için */
        }
        
        /* Select (Açılır Menü) Ok İşareti İçin Özel Ayar */
        select {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23f39c12%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat, repeat;
            background-position: right .7em top 50%, 0 0;
            background-size: .65em auto, 100%;
        }
        select option { background-color: #1a1a24; color: white; }

        input[type="text"]:focus, select:focus { 
            border-color: #f39c12; box-shadow: 0 0 15px rgba(243, 156, 18, 0.3); background: rgba(0, 0, 0, 0.6);
        }

        /* Dosya Seçici (File Input) */
        input[type="file"] {
            width: 100%; padding: 12px; border-radius: 12px; 
            border: 1px dashed rgba(255,255,255,0.3); background: rgba(0, 0, 0, 0.2); 
            color: #aaa; outline: none; transition: all 0.3s ease; font-size: 14px;
        }
        input[type="file"]:hover { border-color: #f39c12; background: rgba(243, 156, 18, 0.05);}
        input[type="file"]::file-selector-button {
            background: linear-gradient(45deg, #f39c12, #e67e22); border: none; 
            color: #000; padding: 10px 20px; border-radius: 8px; cursor: pointer; 
            font-weight: 800; transition: 0.3s; margin-right: 15px; text-transform: uppercase;
        }

        /* 🎮 OYUN MODU SEÇİM KUTUSU (ÖZEL VURGU) */
        .mod-kutusu {
            margin-top: 40px; padding: 25px; 
            border: 2px solid #00f2fe; border-radius: 15px; 
            background: rgba(0, 242, 254, 0.05); position: relative;
            box-shadow: inset 0 0 20px rgba(0, 242, 254, 0.05);
        }
        .mod-kutusu label { color: #00f2fe; font-size: 18px; font-weight: 800; text-transform: uppercase; display: flex; align-items: center; gap: 10px;}
        .mod-kutusu select { border-color: rgba(0, 242, 254, 0.3); font-weight: 600; cursor: pointer; font-size: 16px; padding: 18px;}
        .mod-kutusu select:focus { border-color: #00f2fe; box-shadow: 0 0 20px rgba(0, 242, 254, 0.3); }

        /* RGB İLERİ BUTONU */
        .btn-ileri { 
            width: 100%; padding: 18px; margin-top: 30px;
            background: linear-gradient(45deg, #00b09b, #96c93d); color: white; 
            border: none; border-radius: 12px; font-weight: 800; font-size: 16px; 
            cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-ileri:hover { box-shadow: 0 10px 25px rgba(0, 176, 155, 0.5); transform: translateY(-3px);}

        /* VAZGEÇ LİNKİ */
        .geri-btn { 
            display: block; text-align: center; margin-top: 25px; 
            color: #888; text-decoration: none; font-weight: 600; transition: 0.3s; font-size: 14px;
        }
        .geri-btn:hover { color: #ff0055; text-shadow: 0 0 10px rgba(255, 0, 85, 0.4); }
    </style>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4362078981934571" crossorigin="anonymous"></script>
</head>
<body>
    <div class="form-kutusu">
        <h2>🚀 1. Aşama: Krallığın Kapağı</h2>
        
        <form method="POST" enctype="multipart/form-data">
            
            <div class="grup">
                <label>🏷️ Testin Başlığı</label>
                <input type="text" name="baslik" placeholder="Örn: Efsane Arabalar Testi" required>
            </div>
            
            <div class="grup">
                <label>📝 Kısa Açıklama</label>
                <input type="text" name="aciklama" placeholder="İnsanları bu testi çözmeye ikna et..." required>
            </div>
            
            <div class="grup">
                <label>📸 Kapak Resmi Seç</label>
                <input type="file" name="kapak_resmi" accept="image/*" required>
            </div>
            
            <div class="grup">
                <label>📂 Kategori</label>
                <select name="kategori">
                    <option value="Spor">⚽ Spor & E-Spor</option>
                    <option value="Araba">🏎️ Motor Sporları & Araçlar</option>
                    <option value="Eğlence">🎭 Kültür & Eğlence</option>
                    <option value="Genel Kültür">🧠 Genel Kültür</option>
                    <option value="Oyun">🎮 Video Oyunları</option>
                </select>
            </div>
            
            <div class="grup mod-kutusu">
                <label>🔥 OYUN MODUNU SEÇ</label>
                <select name="oyun_modu">
                    <option value="omu_bumu">⚔️ O mu Bu mu? (İki Seçenekli Kapışma)</option>
                    <option value="kor_siralama">😎 Kör Sıralama (Blind Ranking 1-10)</option>
                    <option value="turnuva">🏆 Turnuva Ağacı (Bracket Şampiyonası)</option>
                    <option value="klasik_test">📝 Yeni Klasik Test (Sadece Metin, Resimsiz)</option>
                    <option value="normal">✅ Eski Normal Test (Resim İçinde Soru)</option>
                    <option value="surat_yarisi">⚡ Sürat Yarışı (3 Saniye - Hızlı Seçim)</option>
                    <option value="kim_populer">📈 Kim Daha Popüler? (Higher / Lower)</option>
                    <option value="butce_savasi">💰 15$ Bütçe Savaşı (Kadro Kur)</option>
                    <option value="piksel_avcisi">🕵️ Piksel Avcısı (Bulanık Tahmin)</option>
                    <option value="casus_kim">🛡️ Casus Kim? (4 Resim, 1 Alakasız)</option>
                    <option value="sesli_quiz">🎵 Sesli Quiz (Şarkı, Egzoz, Replik)</option>
                </select>
            </div>
            
            <button type="submit" class="btn-ileri">İLERİ: SORULARI EKLEMEYE BAŞLA ➔</button>
        </form>
        
        <a href="/" class="geri-btn">← İşlemi İptal Et ve Vazgeç</a>
    </div>
</body>
</html>
