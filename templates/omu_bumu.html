<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ oyun_basligi }} | Kapışma</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f0f13; color: #ffffff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px;}
        
        .oyun-alani { width: 100%; max-width: 900px; text-align: center; }
        .baslik h2 { color: #f39c12; font-size: 32px; margin-bottom: 5px; text-transform: uppercase;}
        .skor-tahtasi { color: #aaa; font-size: 18px; margin-bottom: 40px; }
        
        .kapisma-alani { display: flex; justify-content: center; align-items: center; gap: 40px; position: relative;}
        
        .kart { flex: 1; background-color: #1a1a24; border: 3px solid #2c2c38; border-radius: 20px; overflow: hidden; cursor: pointer; transition: all 0.3s; padding-bottom: 20px;}
        .kart:hover { transform: translateY(-10px); box-shadow: 0 15px 40px rgba(243, 156, 18, 0.3); border-color: #f39c12;}
        .kart img { width: 100%; height: 400px; object-fit: cover; border-bottom: 3px solid #2c2c38;}
        .kart h3 { margin-top: 20px; font-size: 24px; color: #fff;}

        .vs-rozet { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); background-color: #f39c12; color: #0f0f13; width: 70px; height: 70px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 28px; font-weight: 900; box-shadow: 0 0 30px rgba(0,0,0,0.8); z-index: 10;}
        
        .secildi { border-color: #27ae60 !important; background-color: rgba(39, 174, 96, 0.2) !important;}
        
        .buton-mavi { margin-top: 40px; padding:15px 30px; font-size:18px; font-weight:bold; background:#2980b9; color:white; border:none; border-radius:10px; cursor:pointer; transition: 0.3s; }
        .buton-mavi:hover { background:#1f6391; }
    </style>
</head>
<body>

    <div class="oyun-alani" id="oyun-kutusu">
        <div class="baslik">
            <h2>{{ oyun_basligi }}</h2>
            <div class="skor-tahtasi" id="tur-bilgisi">Turnuva Başlıyor...</div>
        </div>

        <div class="kapisma-alani" id="kapisma-kutusu"></div>
    </div>

    <script>
        const OYUN_ID = "{{ aktif_oyun }}";
        let adayHavuzu = []; // O anki turda yarışanlar
        let sonrakiTur = []; // Kazananların beklediği yer
        let toplamMacSayisi = 0;
        let oynananMac = 0;

        window.onload = () => {
            fetch(`/api/sorular/${OYUN_ID}`)
                .then(res => res.json())
                .then(data => {
                    // 1. ADIM: Tüm resimleri (Seçenek 1 ve 2) tek bir havuza atıyoruz
                    data.forEach(soru => {
                        adayHavuzu.push({ isim: soru.secenekler[0], resim: soru.resim });
                        adayHavuzu.push({ isim: soru.secenekler[1], resim: soru.resim_2 });
                    });

                    // Havuzu rastgele karıştır (Her seferinde farklı eşleşme olsun)
                    adayHavuzu = adayHavuzu.sort(() => Math.random() - 0.5);
                    
                    toplamMacSayisi = Math.floor(adayHavuzu.length / 2);
                    sahneyiKur();
                });
        };

        function sahneyiKur() {
            // Eğer havuzda hiç aday kalmadıysa (tur bittiyse)
            if (adayHavuzu.length <= 1) {
                // Eğer 1 kişi arttıysa (tek sayıysa) onu direkt sonraki tura geçir (Bay geçer)
                if (adayHavuzu.length === 1) {
                    sonrakiTur.push(adayHavuzu.pop());
                }

                // Eğer sonraki turda da sadece 1 kişi kaldıysa, ŞAMPİYON BELLİ OLMUŞTUR!
                if (sonrakiTur.length === 1) {
                    sampiyonuGoster(sonrakiTur[0]);
                    return;
                }

                // Şampiyon belli değilse, yeni tura başla!
                adayHavuzu = sonrakiTur.sort(() => Math.random() - 0.5);
                sonrakiTur = [];
                oynananMac = 0;
                toplamMacSayisi = Math.floor(adayHavuzu.length / 2);
            }

            // Havuzdan kapışacak 2 kişiyi çek
            let solAday = adayHavuzu.pop();
            let sagAday = adayHavuzu.pop();
            oynananMac++;

            document.getElementById('tur-bilgisi').innerText = `Kalan Eşleşme: ${toplamMacSayisi - oynananMac + 1}`;

            document.getElementById('kapisma-kutusu').innerHTML = `
                <div class="kart secenek-kart" onclick="secimYap('${solAday.isim}', '${solAday.resim}', this)">
                    <img src="${solAday.resim}">
                    <h3>${solAday.isim}</h3>
                </div>

                <div class="vs-rozet">VS</div>

                <div class="kart secenek-kart" onclick="secimYap('${sagAday.isim}', '${sagAday.resim}', this)">
                    <img src="${sagAday.resim}">
                    <h3>${sagAday.isim}</h3>
                </div>
            `;
        }

        function secimYap(secilenIsim, secilenResim, secilenKart) {
            let tumKartlar = document.querySelectorAll('.secenek-kart');
            tumKartlar.forEach(kart => kart.onclick = null); // İkinci tıklamayı engelle

            // Seçilen kartı yeşil parlat
            secilenKart.classList.add('secildi');

            // Kazananı sonraki tura gönder
            sonrakiTur.push({ isim: secilenIsim, resim: secilenResim });

            // Yarım saniye (500ms) bekle ve sıradaki maçı getir
            setTimeout(() => {
                sahneyiKur();
            }, 500);
        }
    
        function sampiyonuGoster(sampiyon) {
            document.getElementById('tur-bilgisi').style.display = 'none';

            // VİRAL BÜYÜME MOTORU
            let oyunLink = window.location.href;
            let paylasimMetni = `İki seçenek arasından nihai favorim ${sampiyon.isim} oldu! 🔥 Senin favorin kim? Hemen seç: ${oyunLink}`;
            let wpLink = `https://api.whatsapp.com/send?text=${encodeURIComponent(paylasimMetni)}`;
            let xLink = `https://twitter.com/intent/tweet?text=${encodeURIComponent(paylasimMetni)}`;

            document.getElementById('kapisma-kutusu').innerHTML = `
                <div style="width: 100%; text-align: center; animation: 1s ease-out 0s 1 fadeIn;">
                    <h2 style="color: #f39c12; font-size:40px; margin-bottom:30px;">👑 İŞTE SENİN FAVORİN 👑</h2>
                    <div class="kart" style="max-width: 450px; margin: 0 auto; border-color: #f39c12; box-shadow: 0 15px 50px rgba(243, 156, 18, 0.4); cursor: default;">
                        <img src="${sampiyon.resim}" style="height: 400px; border-color: #f39c12;">
                        <h3 style="font-size: 32px; color: #f39c12; padding: 20px 0;">${sampiyon.isim}</h3>
                    </div>
                    
                    <div style="margin-top: 30px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                        <a href="${wpLink}" target="_blank" style="background-color: #25D366; color: white; padding: 15px 25px; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 16px; display: flex; align-items: center; transition: 0.3s; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);">
                            💬 WhatsApp'ta Meydan Oku
                        </a>
                        <a href="${xLink}" target="_blank" style="background-color: #0f0f13; color: white; padding: 15px 25px; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 16px; display: flex; align-items: center; border: 2px solid #333; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.5);">
                            𝕏 X'te Paylaş
                        </a>
                    </div>

                    <button class="buton-mavi" style="margin-top: 30px;" onclick="location.href='/'">Ana Sayfaya Dön</button>
                </div>
            `;
        }

 

    </script> </body>
</html>
